spring.application.name=dispatcher
spring.data.mongodb.uri=mongodb://mongo-dispatcher:27017/yazlab_dispatcher
# POST govdesini (JSON) bozmayi onlemek icin form-url-encoded parser kapali
spring.mvc.formcontentfilter.enabled=false

YAZLAB_SERVICES_AUTH=http://auth-service:8081
YAZLAB_SERVICES_USER=http://user-service:8082
YAZLAB_SERVICES_MESSAGE=http://message-service:8083
yazlab.internal-gateway-token=${YAZLAB_INTERNAL_GATEWAY_TOKEN:yazlab-dev-gateway-token}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}
